name: NoteVisualizer
options:
  bundleIdPrefix: com.notevisualizer
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  AudioKit:
    url: https://github.com/AudioKit/AudioKit.git
    from: "5.6.0"
  SoundpipeAudioKit:
    url: https://github.com/AudioKit/SoundpipeAudioKit.git
    from: "5.6.0"

targets:
  NoteVisualizer:
    type: application
    platform: [iOS, macOS]
    sources:
      - NoteVisualizer
    settings:
      base:
        INFOPLIST_FILE: NoteVisualizer/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.notevisualizer.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: NoteVisualizer/NoteVisualizer.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: AudioKit
      - package: SoundpipeAudioKit
    entitlements:
      path: NoteVisualizer/NoteVisualizer.entitlements
      properties:
        com.apple.security.device.audio-input: true

  NoteVisualizerTests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - NoteVisualizerTests
    dependencies:
      - target: NoteVisualizer_iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/NoteVisualizer.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/NoteVisualizer

  NoteVisualizerTests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - NoteVisualizerTests
    dependencies:
      - target: NoteVisualizer_macOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/NoteVisualizer.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/NoteVisualizer

schemes:
  NoteVisualizer_iOS:
    build:
      targets:
        NoteVisualizer_iOS: all
        NoteVisualizerTests_iOS: [test]
    test:
      targets:
        - NoteVisualizerTests_iOS
    run:
      config: Debug
  NoteVisualizer_macOS:
    build:
      targets:
        NoteVisualizer_macOS: all
        NoteVisualizerTests_macOS: [test]
    test:
      targets:
        - NoteVisualizerTests_macOS
    run:
      config: Debug
