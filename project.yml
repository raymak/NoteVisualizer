name: NoteVisualizer
options:
  bundleIdPrefix: com.notevisualizer
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  AudioKit:
    url: https://github.com/AudioKit/AudioKit.git
    from: "5.6.0"
  SoundpipeAudioKit:
    url: https://github.com/AudioKit/SoundpipeAudioKit.git
    from: "5.6.0"

targets:
  NoteVisualizer:
    type: application
    platform: [iOS, macOS]
    sources:
      - NoteVisualizer
    settings:
      base:
        INFOPLIST_FILE: NoteVisualizer/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.notevisualizer.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: NoteVisualizer/NoteVisualizer.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: AudioKit
      - package: SoundpipeAudioKit
    entitlements:
      path: NoteVisualizer/NoteVisualizer.entitlements
      properties:
        com.apple.security.device.audio-input: true
